name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

env:
  NODE_VERSION: 26

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - run: npm ci
        if: steps.cache-node-modules.outputs.cache-hit != 'true'

      - name: Cache Nx task outputs
        uses: actions/cache@v5
        with:
          path: |
            .nx/cache
            .nx/workspace-data
          key: nx-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - run: npx nx run-many -t lint test build typecheck --no-tui
