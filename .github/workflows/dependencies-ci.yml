name: Dependencies CI

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '**/package.json'
      - '**/package-lock.json'

permissions:
  actions: read
  contents: read

jobs:
  dependencies-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci
      - run: npx nx run-many -t lint test build typecheck --no-tui
